kind = "web"
previewPath = "/"
title = "NexaShift"
version = "1.0.0"
id = "artifacts/nexashift"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23823

[services.development]
run = "pnpm --filter @workspace/nexashift run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexashift", "run", "build" ]
publicDir = "artifacts/nexashift/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23823"
BASE_PATH = "/"
